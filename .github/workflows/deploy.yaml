name: Deploy Angular app to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Github Pages
        run: npx angular-cli-ghpages --dir=dist/portfolio-app/browser --no-silent
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}


